<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register SIPESEL</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="register-container">

    <!-- LEFT SIDE (IMAGE) -->
    <div class="register-left">
        <div class="overlay">
            <h1>SIPESEL</h1>
            <p>Sistem Pengelolaan Sewa Kios</p>
        </div>
    </div>

    <!-- RIGHT SIDE (FORM) -->
    <div class="register-right">
        <div class="register-card">

            <h2>Form Pendaftaran</h2>

            <form id="registerForm">

                <div class="input-group">
                    <input type="text" id="nama" placeholder="Nama Lengkap" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Kios" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="NIK" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Nomor Telepon" required>
                </div>

                <div class="input-group">
                    <input type="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <input type="text" placeholder="Username" required>
                </div>

                <div class="input-group">
                    <input type="password" placeholder="Password" required>
                </div>

                <!-- CUSTOM RADIO -->
                <div class="gender-group">
                    <label>Gender</label>
                    <div class="radio-wrapper">
                        <label class="custom-radio">
                            <input type="radio" name="gender" value="Laki-laki" required>
                            <span class="radio-mark"></span>
                            Laki-laki
                        </label>

                        <label class="custom-radio">
                            <input type="radio" name="gender" value="Perempuan">
                            <span class="radio-mark"></span>
                            Perempuan
                        </label>
                    </div>
                </div>

                <button type="submit" class="register-btn">
                    DAFTAR
                </button>

            </form>

        </div>
        <div class="login-link">
    Sudah punya akun?
    <a href="login.html">Login sekarang</a>
</div>
    </div>

</div>
<script>
document.addEventListener("DOMContentLoaded", function(){

    const form = document.getElementById("registerForm");
    const namaInput = document.getElementById("nama");

    form.addEventListener("submit", function(e){
        e.preventDefault();

        // VALIDASI NAMA (huruf, angka, spasi, petik saja)
        const regexNama = /^[a-zA-Z0-9' ]+$/;

        if (!regexNama.test(namaInput.value)) {
            alert("Nama hanya boleh huruf, angka, spasi dan tanda petik (')!");
            namaInput.focus();
            return;
        }

        const inputs = form.querySelectorAll("input");
        let lengkap = true;

        inputs.forEach(input => {
            if(input.type !== "radio" && input.value.trim() === ""){
                lengkap = false;
            }
        });

        const gender = form.querySelector('input[name="gender"]:checked');

        if(!lengkap || !gender){
            alert("Form harus diisi semua! ⚠️");
            return;
        }

        alert("Berhasil daftar 🎉");

        setTimeout(function(){
            window.location.href = "login.html";
        }, 1500);
    });

});
</script>
</body>
</html>
